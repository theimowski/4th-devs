<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════
       REPORT — Dark theme, world-class document stylesheet
       Scoped to .report — works with any markdown→HTML output.

       Font ··········· Plus Jakarta Sans (200–800, italic)
       Mono ··········· JetBrains Mono (400, 500)
       Base size ······ 17px (dark themes need slightly larger text)
       Line-height ···· 1.8 (extra leading for light-on-dark)
       Measure ········ 42rem (~68ch at 17px)
       Scale ·········· Major-third (1.25×)
       Palette ········ Zinc + Indigo accent
       ═══════════════════════════════════════════════════════════ */

    :root {
      --bg:             #09090b;
      --bg-surface:     #131316;
      --bg-inset:       #18181b;
      --border:         #27272a;
      --border-subtle:  #1e1e22;
      --text:           #d4d4d8;
      --text-bright:    #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted:     #71717a;
      --heading:        #f4f4f5;
      --link:           #818cf8;
      --link-hover:     #a5b4fc;
      --accent:         #6366f1;
      --accent-soft:    #312e81;
      --code-text:      #c4b5fd;
      --code-bg:        #16131f;
      --mark-bg:        #312e81;
      --mark-text:      #c7d2fe;
      --green:          #34d399;
      --green-bg:       #052e1f;
      --yellow:         #fbbf24;
      --yellow-bg:      #2a1f05;
      --red:            #f87171;
      --red-bg:         #2a0808;
      --radius:         10px;
    }


    /* ── 1. Foundation ───────────────────────────────────── */

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 2rem;
      hanging-punctuation: first allow-end last;
    }

    ::selection {
      background: #312e81;
      color: #e0e7ff;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      font-weight: 350;
      font-size: 1.0625rem;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: 'kern' 1, 'liga' 1;
      margin: 0;
    }

    .wrap {
      max-width: 42rem;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    .report {
      font-variant-ligatures: common-ligatures;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .report > :first-child { margin-top: 0; }
    .report > :last-child  { margin-bottom: 0; }
    .report [id]           { scroll-margin-top: 2rem; }


    /* ── 2. Headings ─────────────────────────────────────── */

    .report h1,
    .report h2,
    .report h3,
    .report h4,
    .report h5,
    .report h6 {
      text-wrap: balance;
      overflow-wrap: break-word;
      font-weight: 650;
    }

    .report h1 {
      font-size: 2.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text-bright);
      margin: 0 0 1.75rem;
      padding-bottom: 1.25rem;
      border-bottom: 2px solid var(--border);
    }

    .report h2 {
      font-size: 1.65rem;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--heading);
      margin: 3.5rem 0 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .report h3 {
      font-size: 1.3rem;
      letter-spacing: -0.015em;
      line-height: 1.3;
      color: var(--heading);
      margin: 2.5rem 0 0.75rem;
    }

    .report h4 {
      font-size: 1.1rem;
      line-height: 1.35;
      color: var(--text);
      margin: 2rem 0 0.5rem;
    }

    .report h5 {
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-secondary);
      margin: 1.75rem 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .report h6 {
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-muted);
      margin: 1.5rem 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .report h1 + h2 { margin-top: 1.5rem; }
    .report h2 + h3 { margin-top: 1.25rem; }
    .report h3 + h4 { margin-top: 1rem; }


    /* ── 3. Body text ────────────────────────────────────── */

    .report p {
      margin: 1.25rem 0;
      line-height: 1.8;
      color: var(--text);
      text-wrap: pretty;
      hanging-punctuation: first allow-end last;
      hyphens: auto;
    }

    .report h1 + p,
    .report h2 + p {
      font-size: 1.1rem;
      line-height: 1.85;
      color: var(--text-secondary);
    }

    .report p + p { margin-top: 1rem; }


    /* ── 4. Inline semantics ─────────────────────────────── */

    .report strong, .report b  { font-weight: 600; color: var(--text-bright); }
    .report em, .report i      { font-style: italic; color: var(--text); }
    .report small              { font-size: 0.875em; color: var(--text-muted); line-height: 1.5; }
    .report s, .report del     { text-decoration: line-through; color: var(--text-muted); text-decoration-color: var(--border); }
    .report ins                { text-decoration: none; color: var(--green); background: var(--green-bg); padding: 0.05em 0.25em; border-radius: 3px; border-bottom: 1px dashed var(--green); }
    .report u                  { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--border); }
    .report cite               { font-style: italic; color: var(--text-secondary); }
    .report dfn                { font-style: italic; font-weight: 500; color: var(--text-bright); }
    .report var                { font-style: italic; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; color: var(--code-text); }
    .report samp               { font-family: 'JetBrains Mono', monospace; font-size: 0.875em; color: var(--green); background: var(--green-bg); padding: 0.1em 0.35em; border-radius: 3px; }
    .report time               { font-variant-numeric: tabular-nums; }
    .report address            { font-style: normal; margin: 1.25rem 0; color: var(--text-secondary); line-height: 1.65; }


    /* ── 5. Links ────────────────────────────────────────── */

    .report a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      text-decoration-color: rgba(129, 140, 248, 0.35);
      transition: color 0.15s ease, text-decoration-color 0.15s ease;
    }
    .report a:hover {
      color: var(--link-hover);
      text-decoration-color: var(--link-hover);
    }
    .report a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
      text-decoration: none;
    }
    .report a:active { color: #e0e7ff; }


    /* ── 6. Lists ────────────────────────────────────────── */

    .report ul,
    .report ol {
      margin: 1.25rem 0;
      padding-left: 1.75rem;
    }
    .report ul { list-style-type: disc; }
    .report ol { list-style-type: decimal; }

    .report li {
      margin: 0.4rem 0;
      line-height: 1.75;
      color: var(--text);
      padding-left: 0.25rem;
    }
    .report li::marker          { color: var(--text-muted); }
    .report ol > li::marker     { font-weight: 500; color: var(--text-secondary); font-variant-numeric: tabular-nums; }

    .report li > ul,
    .report li > ol             { margin: 0.35rem 0; }
    .report ul ul               { list-style-type: circle; }
    .report ul ul ul            { list-style-type: square; }
    .report ol ol               { list-style-type: lower-alpha; }
    .report ol ol ol            { list-style-type: lower-roman; }

    .report li > p              { margin: 0.25rem 0; }
    .report li > p:first-child  { margin-top: 0; }

    .report ul:has(> li > input[type="checkbox"]) {
      list-style: none;
      padding-left: 0.25rem;
    }
    .report li > input[type="checkbox"] {
      margin-right: 0.5rem;
      vertical-align: -0.1em;
      width: 1em;
      height: 1em;
      accent-color: var(--accent);
    }


    /* ── 7. Definition lists ─────────────────────────────── */

    .report dl        { margin: 1.25rem 0; }
    .report dt        { font-weight: 600; color: var(--heading); margin-top: 1.25rem; line-height: 1.5; }
    .report dt:first-child { margin-top: 0; }
    .report dd        { margin: 0.25rem 0 0 1.75rem; color: var(--text-secondary); line-height: 1.7; }
    .report dd + dd   { margin-top: 0.5rem; }


    /* ── 8. Blockquotes ──────────────────────────────────── */

    .report blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.875rem 1.25rem;
      margin: 1.5rem 0;
      background: var(--bg-surface);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-secondary);
    }
    .report blockquote p              { margin: 0.5rem 0; }
    .report blockquote p:first-child  { margin-top: 0; }
    .report blockquote p:last-child   { margin-bottom: 0; }

    .report blockquote blockquote {
      margin: 0.75rem 0;
      border-color: #4f46e5;
      background: var(--bg-inset);
    }

    .report blockquote[data-callout="note"]      { border-color: var(--link);   background: rgba(99,102,241,0.06); }
    .report blockquote[data-callout="tip"]       { border-color: var(--green);  background: rgba(52,211,153,0.06); }
    .report blockquote[data-callout="important"] { border-color: #a78bfa;       background: rgba(167,139,250,0.06); }
    .report blockquote[data-callout="warning"]   { border-color: var(--yellow); background: rgba(251,191,36,0.06); }
    .report blockquote[data-callout="caution"]   { border-color: var(--red);    background: rgba(248,113,113,0.06); }


    /* ── 9. Inline code ──────────────────────────────────── */

    .report code {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.8125em;
      background: var(--code-bg);
      padding: 0.15em 0.45em;
      border-radius: 5px;
      color: var(--code-text);
      border: 1px solid rgba(99, 102, 241, 0.15);
      word-break: break-word;
    }


    /* ── 10. Code blocks ─────────────────────────────────── */

    .report pre {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin: 1.5rem 0;
      overflow-x: auto;
      line-height: 1.65;
      tab-size: 2;
      -webkit-overflow-scrolling: touch;
    }
    .report pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.875em;
      color: var(--text);
      word-break: normal;
      overflow-wrap: normal;
    }


    /* ── 11. Tables ──────────────────────────────────────── */

    .report table {
      width: 100%;
      margin: 1.75rem 0;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: auto;
      font-size: 0.9375em;
      line-height: 1.55;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .report caption {
      caption-side: bottom;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
      text-align: left;
    }
    .report thead { background: var(--bg-surface); }
    .report th {
      text-align: left;
      font-weight: 550;
      color: var(--heading);
      padding: 0.75rem 1rem;
      border-bottom: 2px solid var(--border);
      line-height: 1.4;
      white-space: nowrap;
    }
    .report td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text);
      vertical-align: top;
      line-height: 1.65;
    }
    .report tbody tr:last-child td     { border-bottom: none; }
    .report tbody tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
    .report tbody tr:hover td          { background: rgba(255,255,255,0.03); transition: background 0.15s ease; }
    .report tfoot                      { background: var(--bg-surface); }
    .report tfoot td                   { font-weight: 500; color: var(--heading); border-top: 2px solid var(--border); border-bottom: none; }


    /* ── 12. Images & media ──────────────────────────────── */

    .report img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 2rem auto;
      box-shadow: 0 0 0 1px var(--border), 0 8px 30px rgba(0,0,0,0.35);
    }
    .report p > img                     { margin: 2rem auto; }
    .report p:has(> img:only-child)     { margin: 0; line-height: 0; }

    .report figure                      { margin: 2rem 0; }
    .report figure img                  { margin: 0 auto; }
    .report figcaption {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
      text-align: center;
      line-height: 1.5;
    }

    .report video,
    .report audio {
      display: block;
      max-width: 100%;
      margin: 2rem auto;
      border-radius: var(--radius);
    }
    .report video { box-shadow: 0 0 0 1px var(--border), 0 8px 30px rgba(0,0,0,0.35); }
    .report audio { width: 100%; }

    .report iframe,
    .report embed,
    .report object {
      display: block;
      max-width: 100%;
      margin: 2rem auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .report picture       { display: block; margin: 2rem auto; }
    .report picture img   { margin: 0 auto; }


    /* ── 13. Horizontal rules ────────────────────────────── */

    .report hr {
      margin: 3.5rem 0;
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border) 20%, var(--border) 80%, transparent);
    }


    /* ── 14. Keyboard ────────────────────────────────────── */

    .report kbd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8em;
      background: linear-gradient(180deg, var(--bg-inset), var(--bg-surface));
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.15em 0.45em;
      box-shadow: 0 2px 0 var(--border-subtle), inset 0 -1px 0 rgba(255,255,255,0.04);
      color: var(--text);
      white-space: nowrap;
      line-height: 1;
    }


    /* ── 15. Abbreviations ───────────────────────────────── */

    .report abbr[title] {
      text-decoration: underline dotted;
      text-decoration-color: var(--text-muted);
      text-underline-offset: 3px;
      cursor: help;
    }


    /* ── 16. Superscript / subscript ─────────────────────── */

    .report sup, .report sub {
      font-size: 0.75em;
      line-height: 0;
      position: relative;
      vertical-align: baseline;
    }
    .report sup { top: -0.5em; }
    .report sub { bottom: -0.25em; }

    .report sup > a {
      text-decoration: none;
      font-weight: 500;
      color: var(--link);
      padding: 0 0.1em;
    }
    .report sup > a:hover { color: var(--link-hover); }


    /* ── 17. Mark (highlight) ────────────────────────────── */

    .report mark {
      background: var(--mark-bg);
      color: var(--mark-text);
      padding: 0.05em 0.3em;
      border-radius: 3px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }


    /* ── 18. Details / summary ───────────────────────────── */

    .report details {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.875rem 1.25rem;
      margin: 1.25rem 0;
      background: var(--bg-surface);
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    .report details[open] {
      background: var(--bg);
      box-shadow: 0 0 0 1px var(--border);
    }
    .report summary {
      font-weight: 500;
      color: var(--heading);
      cursor: pointer;
      user-select: none;
      line-height: 1.5;
      padding: 0.125rem 0;
      list-style: none;
    }
    .report summary::-webkit-details-marker { display: none; }
    .report summary::before {
      content: '\25B8';
      display: inline-block;
      margin-right: 0.5rem;
      font-size: 0.8em;
      transition: transform 0.2s ease;
      color: var(--text-muted);
    }
    .report details[open] > summary::before { transform: rotate(90deg); }
    .report details[open] > summary {
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-subtle);
    }


    /* ── 19. Footnotes section ───────────────────────────── */

    .report .footnotes,
    .report section[data-footnotes] {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.65;
    }
    .report .footnotes ol,
    .report section[data-footnotes] ol { padding-left: 1.5rem; }
    .report .footnotes li,
    .report section[data-footnotes] li { margin: 0.5rem 0; }


    /* ── 20. Structural sections ─────────────────────────── */

    .report section  { margin: 2.5rem 0; }
    .report article  { margin: 2.5rem 0; }
    .report aside {
      margin: 1.5rem 0;
      padding: 1rem 1.25rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.9375em;
      color: var(--text-secondary);
    }
    .report header   { margin-bottom: 2rem; }
    .report footer   { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.875rem; color: var(--text-muted); }
    .report nav      { margin: 1.5rem 0; }
    .report nav ul   { list-style: none; padding-left: 0; }
    .report nav li   { margin: 0.25rem 0; }


    /* ── 21. Accessibility ───────────────────────────────── */

    @media (prefers-reduced-motion: reduce) {
      .report, .report * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    @media (prefers-contrast: more) {
      :root {
        --text: #f4f4f5;
        --text-secondary: #d4d4d8;
        --text-muted: #a1a1aa;
        --border: #3f3f46;
      }
      .report a { text-decoration-thickness: 2px; }
    }


    /* ── 22. Print (force light) ─────────────────────────── */

    @media print {
      :root {
        --bg: #fff;
        --bg-surface: #f9fafb;
        --bg-inset: #f3f4f6;
        --border: #d1d5db;
        --border-subtle: #e5e7eb;
        --text: #1f2937;
        --text-bright: #000;
        --text-secondary: #374151;
        --text-muted: #6b7280;
        --heading: #000;
        --link: #000;
        --code-text: #6d28d9;
        --code-bg: #f3f4f6;
      }
      body { font-size: 11pt; background: #fff; }
      .report { max-width: 100%; }

      .report h1, .report h2, .report h3 { break-after: avoid; }
      .report p, .report li               { orphans: 3; widows: 3; }
      .report img                         { box-shadow: none; max-height: 4in; }
      .report pre, .report blockquote,
      .report table, .report figure       { break-inside: avoid; }

      .report a { text-decoration: underline; }
      .report a[href^="http"]::after {
        content: " (" attr(href) ")";
        font-size: 0.8em;
        color: #6b7280;
        word-break: break-all;
      }
    }


    /* ── 23. Responsive ──────────────────────────────────── */

    @media (max-width: 768px) {
      .wrap { padding: 2.5rem 1.25rem 4rem; }
      .report h1 { font-size: 1.85rem; }
      .report h2 { font-size: 1.4rem; margin-top: 2.5rem; }
      .report h3 { font-size: 1.15rem; }
      .report pre { padding: 1rem 1.15rem; }
      .report table { font-size: 0.875em; }
      .report th, .report td { padding: 0.625rem 0.75rem; }
      .report blockquote { padding: 0.75rem 1rem; }
    }

    @media (max-width: 480px) {
      .wrap { padding: 2rem 1rem 3rem; }
      body { font-size: 1rem; }
      .report h1 { font-size: 1.6rem; }
      .report h2 { font-size: 1.25rem; margin-top: 2rem; }
      .report h3 { font-size: 1.0625rem; }
      .report ul, .report ol { padding-left: 1.25rem; }
      .report pre { padding: 0.875rem 1rem; border-radius: 8px; font-size: 0.8125rem; }
      .report th, .report td { padding: 0.5rem 0.625rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="report">
      {{CONTENT}}
    </main>
  </div>
</body>
</html>
