- vars:
    id: tool_errors_01_search_no_results
    message: "Search for messages matching query: from:noone@example.test zzz_no_results_eval_12345"
    required_tools_csv: "gmail_search"
    forbidden_tools_csv: "gmail_read,gmail_send,gmail_modify,gmail_attachment"
    expected_primary_tool: "gmail_search"
    expected_hint_status: "empty"
    expected_hint_reason_code: "NO_RESULTS"
    expected_next_action_tool: "gmail_search"
    max_turns: 5

