- vars:
    id: tool_search_01_unread
    message: "Search for messages matching query: from:anna@company.com is:unread"
    required_tools_csv: "gmail_search"
    forbidden_tools_csv: "gmail_read,gmail_send,gmail_modify,gmail_attachment"
    expected_primary_tool: "gmail_search"
    expected_query_contains: "from:anna@company.com"
    max_turns: 5

