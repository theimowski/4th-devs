- vars:
    id: tool_send_01_draft_new
    message: "Draft a new email to tom@company.com with subject 'Status update' and body 'Everything is on track.'"
    required_tools_csv: "gmail_send"
    forbidden_tools_csv: "gmail_search,gmail_read,gmail_modify,gmail_attachment"
    expected_send_mode: "new"
    expected_send_status: "drafted"
    max_turns: 6

