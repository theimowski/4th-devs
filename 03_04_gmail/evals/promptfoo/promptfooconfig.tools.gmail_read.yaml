description: 03_04_gmail tool eval (gmail_read)

prompts:
  - "{{message}}"

providers:
  - id: file://provider.mjs
    label: gmail-agent
    config:
      maxTurns: 6

tests: datasets/tools/gmail_read.yaml

evaluateOptions:
  maxConcurrency: 10

defaultTest:
  assert:
    - type: is-json
      metric: valid_json

    - type: javascript
      metric: valid_eval_payload
      value: |
        const data = JSON.parse(output);
        const isValid =
          data &&
          typeof data === 'object' &&
          !data.error &&
          typeof data.finalText === 'string' &&
          Number.isFinite(Number(data.turns)) &&
          typeof data.reachedMaxTurns === 'boolean' &&
          Array.isArray(data.toolCalls);
        if (isValid) return true;
        return {
          pass: false,
          score: 0,
          reason: `Invalid eval payload: ${output.slice(0, 280)}`,
        };

    - type: javascript
      metric: required_tools
      value: |
        const data = JSON.parse(output);
        const used = Array.isArray(data.toolCalls) ? data.toolCalls.map((tool) => tool.name) : [];
        const required = String(context.vars.required_tools_csv ?? '')
          .split(',')
          .map((name) => name.trim())
          .filter((name) => name.length > 0);
        const missing = required.filter((name) => !used.includes(name));
        if (missing.length === 0) return true;
        return {
          pass: false,
          score: 0,
          reason: `Missing required tools: ${missing.join(', ')}; used=[${used.join(', ')}]`,
        };

    - type: javascript
      metric: forbidden_tools
      value: |
        const data = JSON.parse(output);
        const used = Array.isArray(data.toolCalls) ? data.toolCalls.map((tool) => tool.name) : [];
        const forbidden = String(context.vars.forbidden_tools_csv ?? '')
          .split(',')
          .map((name) => name.trim())
          .filter((name) => name.length > 0);
        const violated = forbidden.filter((name) => used.includes(name));
        if (violated.length === 0) return true;
        return {
          pass: false,
          score: 0,
          reason: `Forbidden tools used: ${violated.join(', ')}; used=[${used.join(', ')}]`,
        };

    - type: javascript
      metric: expected_primary_tool
      value: |
        const expected = String(context.vars.expected_primary_tool ?? '').trim();
        if (!expected) return true;
        const data = JSON.parse(output);
        const used = Array.isArray(data.toolCalls) ? data.toolCalls.map((tool) => tool.name) : [];
        if (used.includes(expected)) return true;
        return {
          pass: false,
          score: 0,
          reason: `Expected primary tool ${expected} was not used; used=[${used.join(', ')}]`,
        };

    - type: javascript
      metric: read_id_argument
      value: |
        const data = JSON.parse(output);
        const readCalls = Array.isArray(data.toolCalls)
          ? data.toolCalls.filter((tool) => tool.name === 'gmail_read')
          : [];
        if (readCalls.length === 0) {
          return { pass: false, score: 0, reason: 'Expected gmail_read call but none found' };
        }

        const hasValidIdArg = readCalls.some((call) => {
          const id = String(call?.parsedArguments?.id ?? '').trim();
          const hasLegacyKind = Object.prototype.hasOwnProperty.call(call?.parsedArguments ?? {}, 'kind');
          return id.length > 0 && !hasLegacyKind;
        });

        if (hasValidIdArg) return true;
        return {
          pass: false,
          score: 0,
          reason: 'Expected gmail_read to be called with non-empty parsedArguments.id and without legacy kind argument',
        };

    - type: javascript
      metric: read_output_envelope
      value: |
        const data = JSON.parse(output);
        const readCalls = Array.isArray(data.toolCalls)
          ? data.toolCalls.filter((tool) => tool.name === 'gmail_read')
          : [];
        if (readCalls.length === 0) return true;

        const isEnvelope = readCalls.every((call) => {
          const out = call?.output;
          return (
            out &&
            typeof out === 'object' &&
            Object.prototype.hasOwnProperty.call(out, 'data') &&
            out.hint &&
            typeof out.hint === 'object' &&
            typeof out.hint.status === 'string' &&
            typeof out.hint.reasonCode === 'string'
          );
        });
        if (isEnvelope) return true;
        return {
          pass: false,
          score: 0,
          reason: 'Expected gmail_read output envelope: { data, hint{status,reasonCode,...} }',
        };

    - type: javascript
      metric: turn_budget
      value: |
        const data = JSON.parse(output);
        const maxTurns = Number(context.vars.max_turns ?? 6);
        const turns = Number(data.turns ?? 0);
        if (Number.isFinite(turns) && turns <= maxTurns) return true;
        return {
          pass: false,
          score: 0,
          reason: `Turn budget exceeded: ${turns} > ${maxTurns}`,
        };
