description: 03_04_gmail tool eval (gmail_send)

prompts:
  - "{{message}}"

providers:
  - id: file://provider.mjs
    label: gmail-agent
    config:
      maxTurns: 7

tests: datasets/tools/gmail_send.yaml

evaluateOptions:
  maxConcurrency: 10

defaultTest:
  assert:
    - type: is-json
      metric: valid_json

    - type: javascript
      metric: valid_eval_payload
      value: |
        const data = JSON.parse(output);
        const isValid =
          data &&
          typeof data === 'object' &&
          !data.error &&
          typeof data.finalText === 'string' &&
          Number.isFinite(Number(data.turns)) &&
          typeof data.reachedMaxTurns === 'boolean' &&
          Array.isArray(data.toolCalls);
        if (isValid) return true;
        return {
          pass: false,
          score: 0,
          reason: `Invalid eval payload: ${output.slice(0, 280)}`,
        };

    - type: javascript
      metric: required_tools
      value: |
        const data = JSON.parse(output);
        const used = Array.isArray(data.toolCalls) ? data.toolCalls.map((tool) => tool.name) : [];
        const required = String(context.vars.required_tools_csv ?? '')
          .split(',')
          .map((name) => name.trim())
          .filter((name) => name.length > 0);
        const missing = required.filter((name) => !used.includes(name));
        if (missing.length === 0) return true;
        return {
          pass: false,
          score: 0,
          reason: `Missing required tools: ${missing.join(', ')}; used=[${used.join(', ')}]`,
        };

    - type: javascript
      metric: forbidden_tools
      value: |
        const data = JSON.parse(output);
        const used = Array.isArray(data.toolCalls) ? data.toolCalls.map((tool) => tool.name) : [];
        const forbidden = String(context.vars.forbidden_tools_csv ?? '')
          .split(',')
          .map((name) => name.trim())
          .filter((name) => name.length > 0);
        const violated = forbidden.filter((name) => used.includes(name));
        if (violated.length === 0) return true;
        return {
          pass: false,
          score: 0,
          reason: `Forbidden tools used: ${violated.join(', ')}; used=[${used.join(', ')}]`,
        };

    - type: javascript
      metric: send_mode
      value: |
        const expectedMode = String(context.vars.expected_send_mode ?? '').trim();
        if (!expectedMode) return true;

        const data = JSON.parse(output);
        const sendCalls = Array.isArray(data.toolCalls)
          ? data.toolCalls.filter((tool) => tool.name === 'gmail_send')
          : [];
        if (sendCalls.length === 0) {
          return { pass: false, score: 0, reason: 'Expected gmail_send call but none found' };
        }

        const matched = sendCalls.some(
          (call) => String(call?.parsedArguments?.mode ?? '').trim() === expectedMode,
        );
        if (matched) return true;
        return {
          pass: false,
          score: 0,
          reason: `Expected gmail_send mode=${expectedMode}`,
        };

    - type: javascript
      metric: send_status
      value: |
        const expected = String(context.vars.expected_send_status ?? '').trim();
        if (!expected) return true;

        const data = JSON.parse(output);
        const sendCalls = Array.isArray(data.toolCalls)
          ? data.toolCalls.filter((tool) => tool.name === 'gmail_send')
          : [];
        const statuses = sendCalls
          .map((call) => call?.output?.data?.status)
          .filter((status) => typeof status === 'string');

        if (expected === 'sent_or_drafted') {
          if (statuses.includes('sent') || statuses.includes('drafted')) return true;
          return {
            pass: false,
            score: 0,
            reason: `Expected gmail_send status sent|drafted; got=[${statuses.join(', ')}]`,
          };
        }

        if (statuses.includes(expected)) return true;
        return {
          pass: false,
          score: 0,
          reason: `Expected gmail_send status=${expected}; got=[${statuses.join(', ')}]`,
        };

    - type: javascript
      metric: send_policy_enforced
      value: |
        const shouldCheck = Boolean(context.vars.expect_enforced_draft);
        if (!shouldCheck) return true;

        const data = JSON.parse(output);
        const sendCalls = Array.isArray(data.toolCalls)
          ? data.toolCalls.filter((tool) => tool.name === 'gmail_send')
          : [];
        if (sendCalls.length === 0) {
          return { pass: false, score: 0, reason: 'Expected gmail_send call but none found' };
        }

        const forcedDraft = sendCalls.some((call) => {
          const out = call.output;
          return (
            out &&
            typeof out === 'object' &&
            out.data &&
            typeof out.data === 'object' &&
            out.data.status === 'drafted' &&
            out.data.policy &&
            out.data.policy.enforcedDraft === true
          );
        });
        if (forcedDraft) return true;
        return {
          pass: false,
          score: 0,
          reason: 'Expected enforced draft policy, but gmail_send output did not report enforcedDraft=true',
        };

    - type: javascript
      metric: turn_budget
      value: |
        const data = JSON.parse(output);
        const maxTurns = Number(context.vars.max_turns ?? 7);
        const turns = Number(data.turns ?? 0);
        if (Number.isFinite(turns) && turns <= maxTurns) return true;
        return {
          pass: false,
          score: 0,
          reason: `Turn budget exceeded: ${turns} > ${maxTurns}`,
        };
