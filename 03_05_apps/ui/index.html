<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo + Shopping Manager</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen text-text-primary font-[Inter,ui-sans-serif,system-ui,sans-serif] antialiased">
    <main class="mx-auto max-w-2xl px-4 py-8 space-y-4">

      <section class="rounded-2xl border border-border bg-card/80 backdrop-blur-sm shadow-lg shadow-black/20 p-5">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <div class="space-y-1">
            <h1 class="text-lg font-semibold tracking-tight text-white">List Manager</h1>
            <p class="text-xs text-text-muted" id="meta">Loading...</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <span class="inline-flex items-center rounded-full border border-border px-2.5 py-0.5 text-[11px] font-medium text-text-muted" id="mode-pill">mode: local</span>
            <span class="inline-flex items-center rounded-full border border-border px-2.5 py-0.5 text-[11px] font-medium text-text-muted" id="active-pill">active: todo</span>
            <button id="reload-btn"
              class="rounded-lg border border-border bg-card px-3 py-1.5 text-xs font-medium text-text-secondary transition hover:border-accent/40 hover:text-white hover:bg-card-hover cursor-pointer">
              Reload
            </button>
            <button class="rounded-lg bg-accent px-4 py-1.5 text-xs font-semibold text-white transition hover:bg-accent-hover shadow-md shadow-accent/20 cursor-pointer" id="save-btn">
              Save
            </button>
          </div>
        </div>
        <div class="mt-3 text-xs text-text-muted" id="status-line">Initializing...</div>
      </section>

      <section class="rounded-2xl border border-border bg-card/80 backdrop-blur-sm shadow-lg shadow-black/20 p-5 space-y-5 min-h-[420px]">
        <div class="flex items-center justify-between gap-3">
          <div class="flex gap-1 rounded-xl bg-surface p-1 border border-border">
            <button id="todo-switch-btn"
              class="tab-btn rounded-lg px-4 py-1.5 text-xs font-medium transition-all cursor-pointer text-text-secondary hover:text-white">
              Todo
            </button>
            <button id="shopping-switch-btn"
              class="tab-btn rounded-lg px-4 py-1.5 text-xs font-medium transition-all cursor-pointer text-text-secondary hover:text-white">
              Shopping
            </button>
          </div>
          <button id="add-item-btn"
            class="rounded-lg border border-dashed border-border px-3 py-1.5 text-xs font-medium text-text-secondary transition hover:border-accent/50 hover:text-accent hover:bg-accent/5 cursor-pointer">
            + Add item
          </button>
        </div>

        <div class="flex items-center gap-3">
          <h2 id="list-title" class="text-base font-semibold text-white tracking-tight">Todo</h2>
          <div class="h-px flex-1 bg-border/60"></div>
        </div>

        <div class="space-y-2" id="list-rows"></div>
      </section>

    </main>

    <script type="module" src="./app.ts"></script>
  </body>
</html>
