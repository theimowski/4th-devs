<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Runtime Sequence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');
    :root {
      --bg: #0a0a0a; --surface: #161616; --border: #3a3a3a; --border-s: #4a4a4a;
      --text: #ffffff; --muted: #888888; --accent: #75f86f;
      --accent-dim: rgba(117,248,111,0.12); --warn: #f78c6c;
      --user: #89ddff; --ai: #c792ea; --code: #ffcb6b;
      --str: #c3e88d; --prop: #82aaff; --comment: #545454;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lexend Deca', system-ui, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--text);
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* === TOP BAR === */
    .top {
      display: flex; flex-direction: column; gap: 12px;
      padding: 20px 32px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .top__row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .tab, .btn {
      font-family: 'DM Mono', monospace; font-size: 11px;
      padding: 5px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .tab:hover, .btn:hover { color: var(--text); border-color: var(--border-s); }
    .tab.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
    .btn.active { color: var(--accent); border-color: var(--accent); }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .counter { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); min-width: 72px; text-align: center; }
    .layers { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .layer-pill {
      font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 4px 8px; border: 1px solid var(--border);
      border-radius: 4px; color: var(--muted); background: var(--surface); transition: all 0.2s;
    }
    .layer-pill.seen { color: var(--text); border-color: var(--border-s); }
    .layer-pill.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

    /* === CANVAS (fixed height, single frame) === */
    .canvas {
      flex-shrink: 0; padding: 16px 32px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .canvas__heads {
      display: flex; align-items: stretch;
    }
    .actor-head {
      flex: 1 1 0; min-width: 80px; text-align: center;
      padding: 8px 4px; border-bottom: 2px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .actor-head--user { border-bottom-color: var(--user); color: var(--user); }
    .actor-head--code { border-bottom-color: var(--code); color: var(--code); }
    .actor-head--ai { border-bottom-color: var(--ai); color: var(--ai); }
    .conn-gap { width: 32px; flex-shrink: 0; }

    .canvas__frame {
      display: flex; align-items: center; min-height: 56px; position: relative;
    }
    .actor-lane {
      flex: 1 1 0; min-width: 80px; display: flex; justify-content: center;
      position: relative; height: 56px;
    }
    .actor-lane__line { height: 56px; border-left: 1px dashed var(--border); }
    .actor-lane__dot {
      position: absolute; top: 50%; left: 50%;
      width: 14px; height: 14px; border-radius: 50%;
      transform: translate(-50%,-50%) scale(0); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    }
    .actor-lane__dot.visible { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    .actor-lane__dot--user { background: var(--user); }
    .actor-lane__dot--code { background: var(--code); }
    .actor-lane__dot--ai { background: var(--ai); }
    .actor-lane__self {
      position: absolute; top: 50%; left: 50%;
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border-s); background: var(--bg);
      transform: translate(-50%,-50%) scale(0); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    }
    .actor-lane__self.visible {
      transform: translate(-50%,-50%) scale(1); opacity: 1;
      border-color: var(--accent); box-shadow: 0 0 0 6px rgba(117,248,111,0.1);
    }
    @keyframes selfPulse {
      0% { box-shadow: 0 0 0 0 rgba(117,248,111,0.3); }
      70% { box-shadow: 0 0 0 10px rgba(117,248,111,0); }
      100% { box-shadow: 0 0 0 0 rgba(117,248,111,0); }
    }
    .actor-lane__self.pulse { animation: selfPulse 0.6s ease-out; }

    .conn-slot {
      width: 32px; flex-shrink: 0; position: relative;
      display: flex; align-items: center; height: 56px;
    }
    .conn-slot__line {
      width: 100%; height: 2px; background: var(--accent);
      transform: scaleX(0); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    .conn-slot--right .conn-slot__line { transform-origin: left; }
    .conn-slot--left .conn-slot__line { transform-origin: right; }
    .conn-slot__line.visible { transform: scaleX(1); }
    .conn-slot__line.returning {
      background: transparent;
      background-image: linear-gradient(to right, var(--accent) 50%, transparent 50%);
      background-size: 8px 2px; background-repeat: repeat-x;
    }
    .conn-slot__arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 0; height: 0; opacity: 0; transition: opacity 0.2s 0.3s;
    }
    .conn-slot__arrow.visible { opacity: 1; }
    .conn-slot--right .conn-slot__arrow {
      right: -1px; border-top: 5px solid transparent;
      border-bottom: 5px solid transparent; border-left: 7px solid var(--accent);
    }
    .conn-slot--left .conn-slot__arrow {
      left: -1px; border-top: 5px solid transparent;
      border-bottom: 5px solid transparent; border-right: 7px solid var(--accent);
    }

    /* Event meta (single updating slot) */
    .canvas__meta {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: var(--surface);
      border: 1px solid var(--accent); border-radius: 6px;
      min-height: 52px; transition: opacity 0.2s;
    }
    .canvas__meta.empty { border-color: var(--border); }
    .meta__stage {
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 4px 8px; border: 1px solid var(--accent);
      border-radius: 4px; color: var(--accent); white-space: nowrap; flex-shrink: 0;
      transition: all 0.25s;
    }
    .canvas__meta.empty .meta__stage { border-color: var(--border); color: var(--muted); }
    .meta__copy { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .meta__title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta__caption { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* === DETAIL STRIP (below canvas, fills remaining space) === */
    .detail-strip {
      flex: 1; min-height: 0; overflow-y: auto;
      display: flex; gap: 16px; padding: 16px 32px;
      border-top: 1px solid var(--border);
    }
    .detail-col {
      flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px;
    }
    .detail-col__eyebrow {
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .detail-col__body { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; min-height: 0; }

    .why-box {
      font-size: 12px; line-height: 1.5; color: var(--text);
      padding: 8px 10px; border-left: 3px solid var(--accent);
      background: var(--accent-dim); border-radius: 0 4px 4px 0;
    }
    .why-box:empty { display: none; }
    .summary-text { font-size: 12px; line-height: 1.5; color: var(--muted); }

    .thread-msg {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 6px 8px; border-radius: 4px; background: var(--surface);
      border: 1px solid var(--border); font-size: 11px;
    }
    .thread-msg--event {
      border-style: dashed;
      background: rgba(255,255,255,0.02);
    }
    .thread-role {
      font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 2px 5px; border-radius: 3px;
      white-space: nowrap; flex-shrink: 0;
    }
    .thread-role--user { background: rgba(137,221,255,0.15); color: var(--user); }
    .thread-role--assistant { background: rgba(199,146,234,0.15); color: var(--ai); }
    .thread-role--thinking { background: rgba(255, 203, 107, 0.12); color: var(--code); }
    .thread-role--tool { background: rgba(255,255,255,0.08); color: var(--text); }
    .thread-role--delegation { background: var(--accent-dim); color: var(--accent); }
    .thread-text { color: var(--muted); min-width: 0; line-height: 1.4; }
    .thread-empty { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--comment); padding: 6px; }

    .obj-card {
      display: flex; flex-direction: column; gap: 4px;
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface);
    }
    .obj-card--new { border-left: 3px solid var(--accent); }
    .obj-card--changed { border-left: 3px solid var(--warn); }
    .obj-card--steady { border-left: 3px solid var(--border); }
    .obj-card__top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .obj-card__name { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--prop); }
    .obj-card__tag {
      font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase;
      padding: 2px 5px; border: 1px solid var(--border); border-radius: 3px; color: var(--muted);
    }
    .obj-card__tag--new { color: var(--accent); border-color: var(--accent); }
    .obj-card__tag--changed { color: var(--warn); border-color: var(--warn); }
    .obj-card__val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--str); line-height: 1.4; }
    .obj-card__prev {
      font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    }
    .obj-card__prev-old { color: var(--comment); text-decoration: line-through; }
    .obj-card__prev-arrow { color: var(--warn); font-size: 9px; }
    .obj-card__prev-new { color: var(--str); }
    .obj-card__note { font-size: 11px; color: var(--muted); line-height: 1.4; }

    .hook {
      font-family: 'DM Mono', monospace; font-size: 10px;
      padding: 5px 8px; border: 1px solid var(--border); border-radius: 3px;
      background: var(--bg); color: var(--text);
    }

    .hint {
      flex-shrink: 0; text-align: center; padding: 8px;
      font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted);
      border-top: 1px solid var(--border);
    }
    .hint kbd {
      font-family: 'DM Mono', monospace; font-size: 9px;
      padding: 1px 4px; border: 1px solid var(--border); border-radius: 2px;
      background: var(--surface); color: var(--text); margin: 0 1px;
    }

    @media (max-width: 1100px) {
      .detail-strip { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="top__row">
      <div id="tabs" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <button type="button" class="btn" id="resetBtn">Reset</button>
      <button type="button" class="btn" id="prevBtn">←</button>
      <button type="button" class="btn" id="nextBtn">→</button>
      <button type="button" class="btn" id="playBtn">Play</button>
      <div class="counter" id="counter">—</div>
      <button type="button" class="btn" id="modeBtn">Compact</button>
    </div>
    <div class="layers" id="layers"></div>
  </div>

  <div class="canvas">
    <div class="canvas__heads" id="heads"></div>
    <div class="canvas__frame" id="frame"></div>
    <div class="canvas__meta empty" id="meta">
      <div class="meta__stage" id="metaStage">—</div>
      <div class="meta__copy">
        <div class="meta__title" id="metaTitle">Select a scenario and press Play or →</div>
        <div class="meta__caption" id="metaCaption"></div>
      </div>
    </div>
  </div>

  <div class="detail-strip">
    <div class="detail-col">
      <div class="detail-col__eyebrow">Why this stage</div>
      <div class="detail-col__body">
        <div class="summary-text" id="summaryText"></div>
        <div class="why-box" id="whyBox"></div>
      </div>
    </div>
    <div class="detail-col">
      <div class="detail-col__eyebrow">Visible thread</div>
      <div class="detail-col__body" id="threadCol"></div>
    </div>
    <div class="detail-col">
      <div class="detail-col__eyebrow">Object mutations</div>
      <div class="detail-col__body" id="objectsCol"></div>
    </div>
    <div class="detail-col">
      <div class="detail-col__eyebrow">Code hooks</div>
      <div class="detail-col__body" id="hooksCol"></div>
    </div>
  </div>

  <div class="hint">
    <kbd>Space</kbd> play/pause <kbd>←</kbd> prev <kbd>→</kbd> next <kbd>R</kbd> reset <kbd>M</kbd> compact/full
  </div>

  <script>
    const LAYERS = [
      "Route",
      "Command",
      "Queue",
      "Scheduler",
      "Claim",
      "Turn Loop",
      "Delegation",
      "Delivery",
      "Persistence",
      "Recovery",
    ];

    const SCENARIOS = {
      simple: {
        label: "Simple reply",
        prompt: 'User says "hi" to Alice.',
        focus: "Minimal happy path. No child runs. No delegation. No recovery. Just the full root lifecycle.",
        actors: [
          { label: "User / UI", type: "user" },
          { label: "HTTP Route", type: "code" },
          { label: "Runtime Engine", type: "code" },
          { label: "Alice", type: "ai" },
        ],
        steps: [
          {
            layer: "Route",
            title: "HTTP route accepts the request",
            caption: "auth + validation + parse",
            from: 0,
            to: 1,
            summary: "The outside world touches the system only here.",
            why: "Route is the product boundary: authentication, validation, and parsing happen before any runtime object exists.",
            objects: [
              { name: "input", value: 'user: hi', tag: "new", note: "External input before persistence." },
            ],
            code: [
              "session-routes.ts#createSessionRoutes",
              "bootstrap-session.ts#parseBootstrapSessionInput",
            ],
          },
          {
            layer: "Command",
            title: "Command persists the first runtime graph",
            caption: "session + thread + msg_1 + job_root + run_alice",
            from: 1,
            to: 2,
            summary: "One transaction writes the durable graph needed for execution.",
            why: "Command creates durable state first so the work survives a crash before any model call begins.",
            objects: [
              { name: "session", value: 'status: active', tag: "new", note: "Conversation container." },
              { name: "thread", value: 'status: active', tag: "new", note: "Visible transcript timeline." },
              { name: "msg_1", value: 'user: hi', tag: "new", note: "First durable transcript row." },
              { name: "job_root", value: 'status: queued', tag: "new", note: "Top-level work order." },
              { name: "run_alice", value: 'status: pending', tag: "new", note: "Execution attempt bound to Alice." },
            ],
            code: [
              "bootstrap-session.ts#createBootstrapSessionCommand.execute",
              "job-repository.ts#create",
              "run-repository.ts#create",
            ],
          },
          {
            layer: "Queue",
            title: "The work is durable but still idle",
            caption: "queued / pending boundary",
            from: 2,
            to: 2,
            summary: "The job exists and the run exists, but no execution has started yet.",
            why: "Queue is the fault-tolerance boundary: if the process dies here, the task is still recoverable from SQLite.",
            objects: [
              { name: "job_root", value: 'status: queued', tag: "steady", note: "Declared but not executing." },
              { name: "run_alice", value: 'status: pending', tag: "steady", note: "Runnable but not claimed." },
            ],
            code: [
              "execute-run.ts#createExecuteRunCommand.execute",
              "job-sync.ts#queueLinkedJob",
            ],
          },
          {
            layer: "Scheduler",
            title: "Scheduler picks the root pair",
            caption: "execute_pending_run(job_root, run_alice)",
            from: 2,
            to: 2,
            summary: "The polling loop decides this queued/pending pair is the next action.",
            why: "Scheduler decides before claim or execution. That selection is deterministic and based on durable state.",
            objects: [
              { name: "decision_root", value: "execute_pending_run(job_root, run_alice)", tag: "new", note: "Transient worker decision." },
            ],
            code: [
              "multiagent-worker.ts#processOneDecision",
              "readiness-engine.ts#pickNextDecision",
            ],
          },
          {
            layer: "Claim",
            title: "Worker claims the run and starts heartbeat",
            caption: "claim + lease renewal",
            from: 2,
            to: 2,
            summary: "The worker takes ownership of the run before it enters execution.",
            why: "Claim prevents duplicate execution. Heartbeat keeps the lease alive while the run is in progress.",
            objects: [
              { name: "claim_root", value: "run_alice -> wrk_1", tag: "new", note: "Lease row in run_claims." },
              { name: "job_root", value: 'status: running', tag: "changed", note: "Work order becomes active." },
              { name: "run_alice", value: 'status: running', tag: "changed", note: "Alice can now enter the turn loop." },
            ],
            code: [
              "readiness-actions.ts#claimRunAndExecute",
              "run-claim-repository.ts#claim",
              "job-sync.ts#recordLinkedJobHeartbeat",
            ],
          },
          {
            layer: "Turn Loop",
            title: "Alice executes one model turn",
            caption: "load context + assemble + stream",
            from: 2,
            to: 3,
            summary: "The run loads the thread, assembles the model request, and streams a plain-text reply.",
            why: "The route never talks to the model directly. The worker always drives execution through the durable run loop.",
            objects: [
              { name: "request_bundle", value: "messages + tools + agent profile", tag: "new", note: "Transient model input built from durable state." },
              { name: "run_alice", value: 'turnCount: 1', tag: "steady", note: "This turn uses no tools." },
            ],
            code: [
              "drive-run.ts#executeRunTurnLoop",
              "load-thread-context.ts#loadThreadContext",
              "assemble-thread-interaction-request.ts#assembleThreadInteractionRequest",
              "run-generation-stream.ts#streamRunInteraction",
            ],
          },
          {
            layer: "Persistence",
            title: "Alice completes with plain text",
            caption: "completeRunWithAssistantMessage",
            from: 3,
            to: 2,
            returning: true,
            summary: "The assistant reply is persisted to the thread and the run closes.",
            why: "With no tool calls, the run can finish in the same turn that produced the answer.",
            objects: [
              { name: "msg_2", value: "assistant: Hi Adam. How can I help?", tag: "new", note: "Visible assistant transcript row." },
              { name: "run_alice", value: 'status: completed', tag: "changed", note: "Run now has durable resultJson." },
              { name: "job_root", value: 'status: completed', tag: "changed", note: "Top-level work order is done." },
            ],
            code: [
              "run-persistence.ts#completeRunWithAssistantMessage",
              "job-sync.ts#markRunJobCompleted",
            ],
          },
          {
            layer: "Route",
            title: "Route returns the durable result",
            caption: "rebuilt output -> client",
            from: 1,
            to: 0,
            returning: true,
            summary: "The user receives a response reconstructed from durable rows.",
            why: "The visible answer comes from persisted state, not from an ephemeral string still sitting in memory.",
            objects: [
              { name: "thread", value: "2 visible messages", tag: "steady", note: "User sees a stable transcript." },
            ],
            code: [
              "run-execution-convergence.ts#waitForRunToReachDurableState",
              "rebuild-run-execution-output.ts#rebuildRunExecutionOutput",
            ],
          },
        ],
      },

      askplay: {
        label: "Play music with follow-up",
        prompt: 'Turn 1: "Ask Tony to play music." Turn 2: "Nora En Pure - Freyja."',
        focus: "Two user turns, one root job. Tony first asks what to play, then plays it on the second turn. The root job is reused, not recreated.",
        actors: [
          { label: "User / UI", type: "user" },
          { label: "HTTP Route", type: "code" },
          { label: "Runtime Engine", type: "code" },
          { label: "Alice", type: "ai" },
          { label: "Tony", type: "ai" },
          { label: "Spotify MCP", type: "code" },
        ],
        steps: [
          {
            layer: "Route",
            title: "Turn 1 enters through the route",
            caption: "ask Tony to play music",
            from: 0,
            to: 1,
            summary: "The first turn routes a music request to Tony, but the exact track is still missing.",
            why: "This sets up a follow-up turn: Tony should ask what to play before any Spotify tool use.",
            objects: [
              { name: "input", value: "user: Ask Tony to play music.", tag: "new", note: "First-turn request payload." },
            ],
            code: [
              "thread-routes.ts#createThreadRoutes",
              "start-thread-interaction.ts#parseStartThreadInteractionInput",
            ],
          },
          {
            layer: "Command",
            title: "Command creates root work for turn 1",
            caption: "msg_1 + job_root + run_alice_1",
            from: 1,
            to: 2,
            summary: "The first root user message, job, and run are persisted for Alice.",
            why: "This is the first turn, so the thread's root job is born here.",
            objects: [
              { name: "msg_1", value: "user: Ask Tony to play music.", tag: "new", note: "First transcript row." },
              { name: "job_root", value: "status: queued", tag: "new", note: "Root job for the thread." },
              { name: "run_alice_1", value: "status: pending", tag: "new", note: "First root run." },
            ],
            code: [
              "start-thread-interaction.ts#createStartThreadInteractionCommand.execute",
              "job-repository.ts#create",
              "run-repository.ts#create",
            ],
          },
          {
            layer: "Queue",
            title: "Turn 1 work is durable and waiting",
            caption: "queued / pending",
            from: 2,
            to: 2,
            summary: "The first root job exists but nothing is executing yet.",
            why: "Queue separates persistence from execution and makes the flow restartable.",
            objects: [
              { name: "job_root", value: "status: queued", tag: "steady", note: "Ready for the worker loop." },
              { name: "run_alice_1", value: "status: pending", tag: "steady", note: "No claim yet." },
            ],

        h.textContent = a.label;
        el.appendChild(h);
        if (i < sc.actors.length - 1) {
          const g = document.createElement("div");
          g.className = "conn-gap";
          el.appendChild(g);
        }
      });
    };

    const buildFrame = (sc) => {
      const el = $("frame");
      el.innerHTML = "";
      lanes = []; conns = [];
      sc.actors.forEach((a, i) => {
        const lane = document.createElement("div");
        lane.className = "actor-lane";
        lane.innerHTML = '<div class="actor-lane__line"></div>';
        const dot = document.createElement("div");
        dot.className = "actor-lane__dot actor-lane__dot--" + actorCls(a.type);
        lane.appendChild(dot);
        const self = document.createElement("div");
        self.className = "actor-lane__self";
        lane.appendChild(self);
        el.appendChild(lane);
        lanes.push({ dot, self });
        if (i < sc.actors.length - 1) {
          const slot = document.createElement("div");
          slot.className = "conn-slot";
          const line = document.createElement("div");
          line.className = "conn-slot__line";
          slot.appendChild(line);
          const arrowR = document.createElement("div");
          arrowR.className = "conn-slot__arrow";
          slot.appendChild(arrowR);
          el.appendChild(slot);
          conns.push({ slot, line, arrow: arrowR });
        }
      });
    };

    const resolveCompactSteps = (sc) => {
      if (!compact) return sc.steps.map((s, i) => ({ ...s, originalIndex: i }));
      const out = [];
      let i = 0;
      while (i < sc.steps.length) {
        const s = sc.steps[i];
        if (s.layer === "Scheduler" && i + 1 < sc.steps.length && sc.steps[i + 1].layer === "Claim") {
          const claim = sc.steps[i + 1];
          out.push({
            ...claim,
            layer: "Scheduler + Claim",
            title: claim.title.replace("Worker claims", "Scheduled & claimed"),
            caption: s.caption + " → " + claim.caption,
            summary: s.summary + " " + claim.summary,
            why: s.why + " " + claim.why,
            objects: [...s.objects, ...claim.objects],
            code: [...s.code, ...claim.code],
            originalIndex: i,
          });
          i += 2;
        } else {
          out.push({ ...s, originalIndex: i });
          i += 1;
        }
      }
      return out;
    };

    const clearFrame = () => {
      lanes.forEach((l) => { l.dot.classList.remove("visible"); l.self.classList.remove("visible", "pulse"); });
      conns.forEach((c) => {
        c.slot.className = "conn-slot";
        c.line.className = "conn-slot__line";
        c.line.classList.remove("visible", "returning");
        c.arrow.className = "conn-slot__arrow";
        c.arrow.classList.remove("visible");
      });
    };

    const renderFrame = (s) => {
      clearFrame();
      if (!s) return;
      const isSelf = s.from === s.to;
      const min = Math.min(s.from, s.to);
      const max = Math.max(s.from, s.to);
      const dir = s.to >= s.from ? "right" : "left";

      if (isSelf) {
        lanes[s.from].self.classList.add("visible", "pulse");
      } else {
        lanes[s.from].dot.classList.add("visible");
        lanes[s.to].dot.classList.add("visible");
        for (let i = min; i < max; i++) {
          const c = conns[i];
          c.slot.classList.add("conn-slot--" + dir);
          c.line.classList.add("visible");
          if (s.returning) c.line.classList.add("returning");
          if ((dir === "right" && i === max - 1) || (dir === "left" && i === min)) {
            c.arrow.classList.add("visible");
            c.slot.classList.add("conn-slot--" + dir);
          }
        }
      }
    };

    const renderMeta = (s) => {
      const m = $("meta");
      if (!s) {
        m.classList.add("empty");
        $("metaStage").textContent = "—";
        $("metaTitle").textContent = "Select a scenario and press Play or →";
        $("metaCaption").textContent = "";
        return;
      }
      m.classList.remove("empty");
      $("metaStage").textContent = s.layer;
      $("metaTitle").textContent = s.title;
      $("metaCaption").textContent = s.caption;
    };

    const findPrev = (name, idx) => {
      for (let i = idx - 1; i >= 0; i--) {
        const m = resolvedSteps[i].objects.find((o) => o.name === name);
        if (m) return m.value;
      }
      return null;
    };

    const renderObjects = (s, idx) => {
      const col = $("objectsCol");
      col.innerHTML = "";
      if (!s) { col.innerHTML = '<div class="obj-card__note">No step selected.</div>'; return; }
      s.objects.forEach((o) => {
        const cls = o.tag === "new" ? "new" : o.tag === "changed" ? "changed" : "steady";
        const prev = o.tag === "changed" ? findPrev(o.name, idx) : null;
        let valHtml = '<div class="obj-card__val">' + esc(o.value) + "</div>";
        if (prev && prev !== o.value) {
          valHtml = '<div class="obj-card__prev"><span class="obj-card__prev-old">' + esc(prev) +
            '</span><span class="obj-card__prev-arrow">→</span><span class="obj-card__prev-new">' +
            esc(o.value) + "</span></div>";
        }
        const d = document.createElement("div");
        d.className = "obj-card obj-card--" + cls;
        d.innerHTML = '<div class="obj-card__top"><div class="obj-card__name">' + esc(o.name) +
          '</div><div class="obj-card__tag obj-card__tag--' + cls + '">' + esc(o.tag) +
          "</div></div>" + valHtml + '<div class="obj-card__note">' + esc(o.note) + "</div>";
        col.appendChild(d);
      });
    };

    const buildVisibleEntries = (idx) => {
      const seen = new Set();
      const entries = [];

      for (let i = 0; i <= idx; i++) {
        const current = resolvedSteps[i];

        for (const object of current.objects) {
          if (object.name.startsWith("msg_") && object.tag === "new" && !seen.has(object.name)) {
            seen.add(object.name);
            const isUser = object.value.startsWith("user:");
            const text = object.value.replace(/^(user|assistant):\s*/, "");
            entries.push({
              id: object.name,
              kind: "message",
              role: isUser ? "user" : "assistant",
              label: isUser ? "User" : "Agent",
              text,
            });
          }
        }

        const toolCall = current.objects.find((object) => object.name.startsWith("tool_call"));
        if (toolCall && !seen.has("event:" + toolCall.name)) {
          seen.add("event:" + toolCall.name);
          entries.push({
            id: "event:" + toolCall.name,
            kind: "event",
            role: "delegation",
            label: "Delegation",
            text: toolCall.value,
          });
        }

        const toolExec = current.objects.find((object) => object.name === "tool_exec");
        if (toolExec && !seen.has("event:" + toolExec.name + ":" + i)) {
          seen.add("event:" + toolExec.name + ":" + i);
          entries.push({
            id: "event:" + toolExec.name + ":" + i,
            kind: "event",
            role: "tool",
            label: "Tool",
            text: toolExec.value,
          });
        }

        const isAiTurn = current.layer === "Turn Loop" && current.from === 2 && current.to >= 3;
        const isSyntheticThinking =
          isAiTurn &&
          !toolCall &&
          !toolExec &&
          !current.title.toLowerCase().includes("wraps") &&
          !current.title.toLowerCase().includes("returns plain text");

        if (isSyntheticThinking && !seen.has("thinking:" + i)) {
          seen.add("thinking:" + i);
          entries.push({
            id: "thinking:" + i,
            kind: "event",
            role: "thinking",
            label: "Thinking",
            text: current.caption,
          });
        }
      }

      return entries;
    };

    const renderThread = (idx) => {
      const col = $("threadCol");
      col.innerHTML = "";
      if (idx < 0) { col.innerHTML = '<div class="thread-empty">No visible content yet</div>'; return; }

      const entries = buildVisibleEntries(idx);
      if (entries.length === 0) { col.innerHTML = '<div class="thread-empty">No visible content yet</div>'; return; }

      entries.forEach((entry) => {
        const d = document.createElement("div");
        const eventClass = entry.kind === "event" ? " thread-msg--event" : "";
        d.className = "thread-msg" + eventClass;
        d.innerHTML = '<span class="thread-role thread-role--' + entry.role + '">' +
          esc(entry.label) + "</span>" +
          '<span class="thread-text">' + esc(entry.text) + "</span>";
        col.appendChild(d);
      });
    };

    const renderHooks = (s) => {
      const col = $("hooksCol");
      col.innerHTML = "";
      if (!s) { col.innerHTML = '<div class="hook">// No step selected</div>'; return; }
      s.code.forEach((h) => {
        const d = document.createElement("div");
        d.className = "hook"; d.textContent = h;
        col.appendChild(d);
      });
    };

    const renderDetail = (s, idx) => {
      $("summaryText").textContent = s ? s.summary : "";
      $("whyBox").textContent = s ? s.why : "";
      renderThread(idx);
      renderObjects(s, idx);
      renderHooks(s);
    };

    const updateLayers = () => {
      layerNodes.forEach((n, i) => {
        const l = LAYERS[i];
        const seen = step >= 0 && resolvedSteps.slice(0, step + 1).some((s) => s.layer.includes(l));
        const active = step >= 0 && resolvedSteps[step].layer.includes(l);
        n.classList.toggle("seen", seen);
        n.classList.toggle("active", active);
      });
    };

    const updateUI = () => {
      const sc = SCENARIOS[scenario];
      $("counter").textContent = step < 0 ? "—" : (step + 1) + " / " + resolvedSteps.length;
      $("prevBtn").disabled = step <= -1;
      $("nextBtn").disabled = step >= resolvedSteps.length - 1;
      $("playBtn").textContent = playing ? "Pause" : "Play";
      $("playBtn").classList.toggle("active", playing);
      $("modeBtn").textContent = compact ? "Full" : "Compact";
      $("modeBtn").classList.toggle("active", compact);
      $("tabs").querySelectorAll(".tab").forEach((t) => {
        t.classList.toggle("active", t.dataset.key === scenario);
      });
      updateLayers();
      const s = step >= 0 ? resolvedSteps[step] : null;
      renderFrame(s);
      renderMeta(s);
      renderDetail(s, step);
    };

    const setStep = (idx) => {
      step = Math.max(-1, Math.min(idx, resolvedSteps.length - 1));
      updateUI();
    };

    const stopPlay = () => { playing = false; if (timer) { clearInterval(timer); timer = null; } };

    const nextStep = () => {
      if (step < resolvedSteps.length - 1) setStep(step + 1);
      else stopPlay();
      updateUI();
    };
    const prevStep = () => { if (step > -1) setStep(step - 1); };

    const startPlay = () => {
      if (step >= resolvedSteps.length - 1) setStep(-1);
      playing = true; updateUI();
      timer = setInterval(() => nextStep(), 900);
    };

    const togglePlay = () => { if (playing) { stopPlay(); updateUI(); } else startPlay(); };

    const toggleCompact = () => {
      compact = !compact;
      resolvedSteps = resolveCompactSteps(SCENARIOS[scenario]);
      step = -1;
      stopPlay();
      updateUI();
    };

    const setScenario = (key) => {
      stopPlay();
      scenario = key;
      const sc = SCENARIOS[key];
      buildHeads(sc);
      buildFrame(sc);
      resolvedSteps = resolveCompactSteps(sc);
      step = -1;
      updateUI();
    };

    buildTabs();
    buildLayers();
    setScenario(scenario);

    $("nextBtn").addEventListener("click", () => { stopPlay(); nextStep(); updateUI(); });
    $("prevBtn").addEventListener("click", () => { stopPlay(); prevStep(); });
    $("resetBtn").addEventListener("click", () => { stopPlay(); setStep(-1); });
    $("playBtn").addEventListener("click", togglePlay);
    $("modeBtn").addEventListener("click", toggleCompact);

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") { e.preventDefault(); stopPlay(); nextStep(); updateUI(); }
      if (e.key === "ArrowLeft") { e.preventDefault(); stopPlay(); prevStep(); }
      if (e.key === " ") { e.preventDefault(); togglePlay(); }
      if (e.key === "r" || e.key === "R") { e.preventDefault(); stopPlay(); setStep(-1); }
      if (e.key === "m" || e.key === "M") { e.preventDefault(); toggleCompact(); }
    });
  </script>
</body>
</html>
